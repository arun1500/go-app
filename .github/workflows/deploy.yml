name: ci/cd

on: 
push:
branches: ["main"]

env:
image1: ghcr,io/${{github.reposity_owner }}/go-app

jobs:
 build-and -test:
 runs-on: ubuntu-latest

 permissions:
 contents: read
 packages: write

 steps:
 -name: checkout code
 uses: action/checkout@v4

 -name : run go vet
 run : go vet ./

 -name: build docker image
 run: docker build -t $image1:latest

 -name: scan image
 uses: aquasecurity/trivy-action@v0.24.0
 with:
 image-ref: $
 {{env.image1}} : latest
 severity: CRITICAL,HIGH
 exit-code: '1'

