name: ci/cd

on:
  push:
    branches: ["main"]

env:
  image1: ghcr.io/${{ github.repository_owner }}/go-app

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read  # needed to pull GHCR images

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install Go and run go vet
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      - name: Run go vet
        run: go vet ./...

      # 3️⃣ Log in to GitHub Container Registry (needed for Trivy to pull the image)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.image1 }}:latest .

      # 5️⃣ Scan Docker image with Trivy
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.28.1
        with:
          image-ref: ${{ env.image1 }}:latest
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: table
